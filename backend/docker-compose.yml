version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: finance_app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_app
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: finance_app_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: go run cmd/server/main.go
    develop:
      watch:
        - action: sync
          path: ./
          target: /app
        - action: rebuild
          path: ./
          target: /app
        - action: restart
          path: ./
volumes:
  postgres_data:
