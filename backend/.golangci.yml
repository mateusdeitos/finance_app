version: "2"

run:
  concurrency: 4
  timeout: 5m
  tests: true

output:
  formats:
    text:
      path: stderr
      print-linter-name: true

linters:
  default: all
  settings:
    cyclop:
      max-complexity: 49     # Default 10, raised to accommodate existing code (max seen: 48)
    funlen:
      lines: 202             # Default 60, raised for complex functions (max seen: 201)
      statements: 100        # Default 40, raised for complex service functions (max seen: 99)
    gocognit:
      min-complexity: 110    # Default 30, raised to accommodate existing code (max seen: 101)
    gocyclo:
      min-complexity: 50     # Default 30, raised to accommodate existing code (max seen: 48)
    nestif:
      min-complexity: 17     # Default 5, raised to accommodate existing code (max seen: 16)
  disable:
    # TODO code style-confirm whether to disable: does not affect functionality
    - testifylint        # 50 issues: testify usage convention
    - tagliatelle        # 50 issues: struct tag naming convention
    - revive             # 50 issues: golint replacement with many style rules
    - lll                # 50 issues: line length limit
    - varnamelen         # 32 issues: variable name length
    - wsl                # 26 issues: deprecated, replaced by wsl_v5
    - dupl               # 18 issues: code clone detection
    - mnd                # 17 issues: magic numbers
    - paralleltest       # 14 issues: parallel test suggestion
    - wsl_v5             # 12 issues: whitespace v5 style
    - ireturn            # 12 issues: interface return values
    - funcorder          # 9 issues: function order in file
    - nlreturn           # 7 issues: blank line before return
    - whitespace         # 6 issues: whitespace style
    - testpackage        # 5 issues: test package naming (_test suffix)
    - godot              # 3 issues: comment period style
    - gosmopolitan       # 1 issue: time.Local internationalization check
    - godoclint          # 2 issues: godoc comment format (non-English comments in codebase)
    # TODO critical bugs-suggest fix: security and error handling, recommend gradual fixes
    - wrapcheck          # 50 issues: external error wrapping
    - err113             # 8 issues: dynamic error definitions (use errors.New)
    # TODO: requires project-specific allow/deny list configuration
    - depguard           # 50 issues: import guard (no project config defined)
    # TODO new features-defer: does not affect current code, can be selectively enabled later
    - exhaustruct        # 50 issues: struct field completeness
    - gochecknoglobals   # 15 issues: global variable check
    - gochecknoinits     # 1 issue: init function in auto-generated swagger docs
    - modernize          # 5 issues: modern Go syntax suggestions
    - godox              # 1 issue: TODO/FIXME comment markers
    - dogsled            # 1 issue: blank identifier count
    - unparam            # 1 issue: always-nil error return in normalizeInstallments
    - recvcheck          # 10 issues: GORM entities intentionally mix pointer/value receivers
  exclusions:
    paths:
      - cmd/scripts/  # dev-only scripts, lint rules relaxed intentionally
    rules:
      # Auto-generated mocks — never edit manually
      - path: mocks/
        linters: [all]
      # Test files — relax style, security and correctness checks common in table-driven tests
      - path: _test\.go
        linters:
          - unconvert        # 3 issues: unnecessary conversions in test assertions
          - exhaustive       # missing switch cases in test helpers
          - noinlineerr      # inline err patterns common in tests
          - errcheck         # unchecked errors common in test assertions
          - forcetypeassert  # type assertions in test helpers
          - ineffassign      # 3 issues: err reassigned before use in multi-step test setup
          - wastedassign     # 3 issues: err assigned without check in sequential test steps
          - staticcheck      # SA4006: err assigned but not used in multi-step test sequences
      # internal/service/test_setup_with_db.go — test infrastructure (not *_test.go named)
      - path: internal/service/test_setup_with_db\.go
        linters:
          - gosec            # G404: weak random in test data generation (randomInt for names)
      # pkg/errors — intentional error handling implementation patterns
      - path: pkg/errors/errors\.go
        linters:
          - errorlint        # 2 issues: type assertions on errors (intentional pattern)
          - perfsprint       # 2 issues: fmt.Sprintf in error formatting (acceptable)
      # pkg/tests — test infrastructure utilities
      - path: pkg/tests/
        linters:
          - noctx            # 1 issue: DB.Ping without context in test setup
          - errcheck         # unchecked errors in test helpers
          - noinlineerr      # 2 issues: inline err in test setup utilities
      # internal/middleware — intentional type assertion error pattern
      - path: internal/middleware/error_handler\.go
        linters:
          - errorlint        # 1 issue: type assertion on error (intentional dispatch)
          - forcetypeassert  # 1 issue: unchecked type assertion (matches error type)
      # internal/entity — GORM entities mix pointer/value receivers (ToDomain/FromDomain pattern)
      # Also: nil,nil used as "not found" API contract
      - path: internal/entity/
        linters:
          - nilnil           # nil,nil for "not found" in value conversion
      # internal/repository — nil,nil used as "not found" API contract; inline err is idiomatic GORM
      - path: internal/repository/
        linters:
          - nilnil           # nil,nil for "not found" pattern
          - noinlineerr      # inline err in GORM Create/First calls (idiomatic repository pattern)
      # internal/service — Rollback errors intentionally ignored; inline err is common service pattern
      - path: internal/service/
        linters:
          - errcheck         # Rollback return value ignored in deferred cleanup
          - nilnil           # nil,nil return in injectLinkedTransactions (no links case)
          - noinlineerr      # inline err in service methods (idiomatic Go service pattern)
      # internal/domain/transaction.go — fmt.Sscanf, switch, type assertion intentional
      - path: internal/domain/transaction\.go
        linters:
          - errcheck         # 1 issue: fmt.Sscanf in JSON unmarshaling (partial parse ok)
          - gosec            # G104: Sscanf error unhandled (intentional partial parse)
          - exhaustive       # 1 issue: transfer case handled separately in type system
          - forcetypeassert  # 1 issue: type assertion in value conversion helper
          - noinlineerr      # 1 issue: inline err in json.Unmarshal (idiomatic Go)
      # internal/handler — inline error style is idiomatic Echo handler pattern
      - path: internal/handler/
        linters:
          - noinlineerr      # 3 issues: if err := ...; err != nil (idiomatic in Echo handlers)
      # internal/config — inline err in config parsing is common Go pattern
      - path: internal/config/
        linters:
          - noinlineerr      # 1 issue: inline err in strconv.Atoi config parsing
      # cmd/server/main — entry-point specific patterns
      - path: cmd/server/main\.go
        linters:
          - gocritic         # 1 issue: exitAfterDefer (log.Fatal in main is intentional)
          - errorlint        # 1 issue: err != http.ErrServerClosed (sentinel comparison ok)
          - noinlineerr      # 2 issues: inline err in server start/shutdown (idiomatic Go)
      # internal/middleware — noinlineerr: inline err in JSON response is idiomatic
      - path: internal/middleware/
        linters:
          - noinlineerr      # 1 issue: if err := c.JSON(...); err != nil (idiomatic)
      # internal/repository/category_repository — simple else-if refactor, low priority
      - path: internal/repository/category_repository\.go
        linters:
          - gocritic         # 1 issue: elseif simplification
      # internal/service/transaction_update — specific known issues
      - path: internal/service/transaction_update\.go
        linters:
          - gocritic         # 1 issue: ifElseChain rewrite suggestion
          - unconvert        # 1 issue: ServiceErrors conversion
          - exhaustive       # 1 issue: missing PropagationSettingsCurrent case (handled by caller)
          - maintidx         # 1 issue: rebuildTransactions low maintainability index (complex by design)
      # internal/service/transaction_create — known conversion pattern
      - path: internal/service/transaction_create\.go
        linters:
          - unconvert        # 1 issue: ServiceErrors conversion
      # internal/service/auth_service — fmt.Sprintf for string concat (minor)
      - path: internal/service/auth_service\.go
        linters:
          - perfsprint       # 1 issue: fmt.Sprintf can be string concatenation
      # internal/repository/db_transaction — context key type (SA1029)
      # internal/service/user_connection_service — duplicate import alias (ST1019)
      - path: (internal/repository/db_transaction\.go|internal/service/user_connection_service\.go)
        linters:
          - staticcheck      # SA1029: string context key; ST1019: duplicate import alias
      # internal/service/transaction_update — SA4010 append result unused
      - path: internal/service/transaction_update\.go
        linters:
          - staticcheck      # SA4010: append result unused in complex rebuild logic
      # internal/service/transaction_import — Portuguese words flagged as English misspellings
      - path: internal/service/transaction_import\.go
        linters:
          - misspell         # "anual" (pt-BR: annual), "diário" etc. are correct Portuguese

# TODO: enable formatters once code is formatted - 4 files non-compliant with gofmt/goimports:
#   internal/domain/settlement.go, internal/entity/settlement.go,
#   internal/middleware/error_handler.go, internal/service/transaction_update.go
# formatters:
#   enable:
#     - gofmt
#     - goimports
