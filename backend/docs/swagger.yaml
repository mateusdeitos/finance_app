        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Check rows for possible duplicates
      tags:
      - transactions
  /api/transactions/import-csv:
    post:
      consumes:
      - multipart/form-data
      description: Accepts a multipart .csv, .xlsx or .xls file and an account_id.
        XLSX and legacy XLS files are converted to CSV server-side using the first
        sheet. Returns parsed rows enriched with inferred categories and possible
        duplicate matches. No transactions are created; use the standard POST /transactions
        endpoint to create each confirmed row.
      parameters:
      - description: Destination account ID
        in: formData
        name: account_id
        required: true
        type: integer
      - description: CSV, XLSX or XLS file
        in: formData
        name: file
