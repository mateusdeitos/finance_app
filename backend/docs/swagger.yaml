basePath: /
definitions:
  domain.AcceptChargeRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: integer
      date:
        type: string
    type: object
  domain.Account:
    properties:
      avatar_background_color:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      initial_balance:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      position:
        type: integer
      updated_at:
        type: string
      user_connection:
        $ref: '#/definitions/domain.UserConnection'
      user_id:
        type: integer
    type: object
  domain.AccountDeletionInfo:
    properties:
      transaction_count:
        type: integer
    type: object
  domain.BalanceResult:
    properties:
      balance:
        type: integer
    type: object
  domain.Category:
    properties:
      children:
        items:
          $ref: '#/definitions/domain.Category'
        type: array
      created_at:
        type: string
      emoji:
        type: string
      id:
        type: integer
      name:
        type: string
      parent:
        $ref: '#/definitions/domain.Category'
      parent_id:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.Charge:
    properties:
      amount:
        type: integer
      charger_account_id:
        type: integer
      charger_user_id:
        type: integer
      connection_id:
        type: integer
      created_at:
        type: string
      date:
        type: string
      description:
        type: string
      id:
        type: integer
      initiator_user_id:
        description: |-
          InitiatorUserID is the user who created the charge. It is independent of
          the charger/payer roles: a payer can initiate ("I'll pay you") just as a
          charger can ("you owe me"). The OTHER party is the one who must accept or
          reject; the initiator is the one who can cancel.
        type: integer
      payer_account_id:
        type: integer
      payer_user_id:
        type: integer
      period_month:
        type: integer
      period_year:
        type: integer
      status:
        $ref: '#/definitions/domain.ChargeStatus'
      updated_at:
        type: string
    type: object
  domain.ChargeInitiatorRole:
    enum:
    - charger
    - payer
    type: string
    x-enum-varnames:
    - ChargeInitiatorRoleCharger
    - ChargeInitiatorRolePayer
  domain.ChargeStatus:
    enum:
    - pending
    - paid
    - rejected
    - cancelled
    type: string
    x-enum-varnames:
    - ChargeStatusPending
    - ChargeStatusPaid
    - ChargeStatusRejected
    - ChargeStatusCancelled
  domain.CheckDuplicateRowInput:
    properties:
      amount:
        description: cents
        type: integer
      date:
        $ref: '#/definitions/domain.Date'
      description:
        type: string
      row_index:
        type: integer
      type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.CheckDuplicateRowResult:
    properties:
      matches:
        items:
          $ref: '#/definitions/domain.Transaction'
        type: array
      row_index:
        type: integer
      settlement_matches:
        items:
          $ref: '#/definitions/domain.SettlementMatch'
        type: array
    type: object
  domain.CheckDuplicatesBulkRequest:
    properties:
      account_id:
        description: optional; when set, only checks within that account
        type: integer
      rows:
        items:
          $ref: '#/definitions/domain.CheckDuplicateRowInput'
        type: array
    type: object
  domain.CheckDuplicatesBulkResponse:
    properties:
      rows:
        items:
          $ref: '#/definitions/domain.CheckDuplicateRowResult'
        type: array
    type: object
  domain.CreateChargeRequest:
    properties:
      amount:
        type: integer
      connection_id:
        type: integer
      date:
        type: string
      description:
        type: string
      my_account_id:
        type: integer
      period_month:
        type: integer
      period_year:
        type: integer
      role:
        $ref: '#/definitions/domain.ChargeInitiatorRole'
    type: object
  domain.Date:
    properties:
      time.Time:
        type: string
    type: object
  domain.DeleteCategoryRequest:
    properties:
      replace_with_id:
        type: integer
    type: object
  domain.DuplicateCriteria:
    properties:
      amount_tolerance_cents:
        type: integer
      description_similarity_threshold:
        type: number
    type: object
  domain.ImportCSVResponse:
    properties:
      duplicate_count:
        type: integer
      duplicate_criteria:
        $ref: '#/definitions/domain.DuplicateCriteria'
      error_count:
        type: integer
      rows:
        items:
          $ref: '#/definitions/domain.ParsedImportRow'
        type: array
      total_rows:
        type: integer
    type: object
  domain.ImportRowStatus:
    enum:
    - pending
    type: string
    x-enum-varnames:
    - ImportRowStatusPending
  domain.Notification:
    properties:
      amount:
        description: |-
          Amount é o valor (em centavos) associado à notificação. Persistido para que
          o corpo mostre o valor mesmo quando a entidade referenciada foi apagada
          (ex.: exclusão de transação compartilhada, onde não há mais o que resolver).
        type: integer
      created_at:
        type: string
      description:
        type: string
      entity_id:
        type: integer
      entity_type:
        type: string
      id:
        type: integer
      read:
        type: boolean
      tx_type:
        description: |-
          TxType is the underlying transaction type ("expense" | "income" | "transfer")
          persisted so the in-app inbox can render the gendered noun (despesa/receita)
          matching the push copy, even after the referenced entity is gone.
        type: string
      type:
        type: string
      user_id:
        type: integer
    type: object
  domain.NotificationListResult:
    properties:
      has_more:
        type: boolean
      next_cursor:
        type: string
      notifications:
        items:
          $ref: '#/definitions/domain.Notification'
        type: array
    type: object
  domain.NotificationUnreadCountResponse:
    properties:
      count:
        type: integer
    type: object
  domain.OnboardingAccountInput:
    properties:
      avatar_background_color:
        type: string
      description:
        type: string
      initial_balance:
        type: integer
      name:
        type: string
    type: object
  domain.OnboardingCategoryInput:
    properties:
      children:
        items:
          $ref: '#/definitions/domain.OnboardingCategoryInput'
        type: array
      emoji:
        type: string
      name:
        type: string
    type: object
  domain.OnboardingSetupRequest:
    properties:
      accounts:
        items:
          $ref: '#/definitions/domain.OnboardingAccountInput'
        type: array
      categories:
        items:
          $ref: '#/definitions/domain.OnboardingCategoryInput'
        type: array
    type: object
  domain.OnboardingStatus:
    properties:
      completed:
        type: boolean
    type: object
  domain.OperationType:
    enum:
    - credit
    - debit
    type: string
    x-enum-varnames:
    - OperationTypeCredit
    - OperationTypeDebit
  domain.ParsedImportRow:
    properties:
      amount:
        description: cents
        type: integer
      category_id:
        type: integer
      category_inferred:
        type: boolean
      date:
        allOf:
        - $ref: '#/definitions/domain.Date'
        description: |-
          Date is a calendar date (no time-of-day). It serializes as YYYY-MM-DD so
          the frontend's date components parse it as a local date instead of a UTC
          instant — emitting a full RFC3339 timestamp here shifts the displayed day
          by one in negative-offset timezones (e.g. UTC-3).
      description:
        type: string
      destination_account_id:
        type: integer
      duplicate_matches:
        items:
          $ref: '#/definitions/domain.Transaction'
        type: array
      parse_errors:
        items:
          type: string
        type: array
      recurrence_count:
        type: integer
      recurrence_current_installment:
        type: integer
      recurrence_type:
        $ref: '#/definitions/domain.RecurrenceType'
      row_index:
        type: integer
      settlement_matches:
        items:
          $ref: '#/definitions/domain.SettlementMatch'
        type: array
      status:
        $ref: '#/definitions/domain.ImportRowStatus'
      type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.PushKeys:
    properties:
      auth:
        type: string
      p256dh:
        type: string
    type: object
  domain.PushSubscriptionStatusResponse:
    properties:
      subscribed:
        type: boolean
    type: object
  domain.RecurrenceSettings:
    properties:
      current_installment:
        type: integer
      total_installments:
        type: integer
      type:
        $ref: '#/definitions/domain.RecurrenceType'
    type: object
  domain.RecurrenceType:
    enum:
    - daily
    - weekly
    - monthly
    - yearly
    type: string
    x-enum-varnames:
    - RecurrenceTypeDaily
    - RecurrenceTypeWeekly
    - RecurrenceTypeMonthly
    - RecurrenceTypeYearly
  domain.Settlement:
    properties:
      account_id:
        type: integer
      amount:
        description: Amount in cents
        type: integer
      created_at:
        type: string
      date:
        type: string
      id:
        type: integer
      parent_transaction_id:
        type: integer
      source_transaction:
        allOf:
        - $ref: '#/definitions/domain.Transaction'
        description: |-
          SourceTransaction is populated when the caller requests
          WithSourceTransaction on the filter. nil otherwise.
      source_transaction_id:
        type: integer
      type:
        $ref: '#/definitions/domain.SettlementType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.SettlementMatch:
    properties:
      account_id:
        type: integer
      amount:
        description: cents
        type: integer
      date:
        type: string
      description:
        type: string
      id:
        type: integer
      source_transaction_id:
        type: integer
      type:
        $ref: '#/definitions/domain.SettlementType'
    type: object
  domain.SettlementType:
    enum:
    - credit
    - debit
    type: string
    x-enum-varnames:
    - SettlementTypeCredit
    - SettlementTypeDebit
  domain.SettlementUpdateRequest:
    properties:
      date:
        $ref: '#/definitions/domain.Date'
    type: object
  domain.SplitSettings:
    properties:
      amount:
        type: integer
      connection_id:
        type: integer
      date:
        allOf:
        - $ref: '#/definitions/domain.Date'
        description: |-
          Date overrides the settlement.date created from this split. When nil
          the settlement inherits the source transaction's date on create and
          the previously-saved value on update (preserved by the sync snapshot).
      percentage:
        type: integer
      userConnection:
        $ref: '#/definitions/domain.UserConnection'
    type: object
  domain.StartImpersonationRequest:
    properties:
      reason:
        type: string
      target_user_id:
        type: integer
    type: object
  domain.SubscribePushRequest:
    properties:
      endpoint:
        type: string
      keys:
        $ref: '#/definitions/domain.PushKeys'
    type: object
  domain.Tag:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.Transaction:
    properties:
      account_id:
        type: integer
      amount:
        description: Amount in cents
        type: integer
      category_id:
        type: integer
      charge_id:
        type: integer
      created_at:
        type: string
      date:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      id:
        type: integer
      installment_number:
        type: integer
      linked_transactions:
        items:
          $ref: '#/definitions/domain.Transaction'
        type: array
      operation_type:
        $ref: '#/definitions/domain.OperationType'
      origin_settlement_id:
        description: |-
          OriginSettlementID is set only on synthetic Transaction entries produced
          by the listing endpoint to surface settlements whose source transaction
          lives on a different (non-filtered) account. The ID field of such entries
          is a negative sentinel; the row is read-only and should not be edited.
        type: integer
      original_user_id:
        type: integer
      settlements_from_source:
        items:
          $ref: '#/definitions/domain.Settlement'
        type: array
      source_transaction_id:
        description: |-
          SourceTransactionID is set only on synthetic Transaction entries (see
          OriginSettlementID). It points to the real source transaction backing
          the surfaced settlement so the frontend can fetch the full transaction
          and open it for editing when the synthetic row is clicked.
        type: integer
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_recurrence:
        $ref: '#/definitions/domain.TransactionRecurrence'
      transaction_recurrence_id:
        type: integer
      type:
        $ref: '#/definitions/domain.TransactionType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.TransactionCreateRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: integer
      category_id:
        type: integer
      charge_id:
        type: integer
      date:
        $ref: '#/definitions/domain.Date'
      description:
        type: string
      destination_account_id:
        type: integer
      recurrence_settings:
        $ref: '#/definitions/domain.RecurrenceSettings'
      split_settings:
        items:
          $ref: '#/definitions/domain.SplitSettings'
        type: array
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.TransactionPropagationSettings:
    enum:
    - all
    - current
    - current_and_future
    type: string
    x-enum-varnames:
    - TransactionPropagationSettingsAll
    - TransactionPropagationSettingsCurrent
    - TransactionPropagationSettingsCurrentAndFuture
  domain.TransactionRecurrence:
    properties:
      created_at:
        type: string
      id:
        type: integer
      installments:
        type: integer
      type:
        $ref: '#/definitions/domain.RecurrenceType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.TransactionType:
    enum:
    - expense
    - income
    - transfer
    type: string
    x-enum-varnames:
    - TransactionTypeExpense
    - TransactionTypeIncome
    - TransactionTypeTransfer
  domain.TransactionUpdateRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: integer
      category_id:
        type: integer
      date:
        $ref: '#/definitions/domain.Date'
      description:
        type: string
      destination_account_id:
        type: integer
      propagation_settings:
        $ref: '#/definitions/domain.TransactionPropagationSettings'
      recurrence_settings:
        $ref: '#/definitions/domain.RecurrenceSettings'
      split_settings:
        items:
          $ref: '#/definitions/domain.SplitSettings'
        type: array
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      external_id:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.UserConnection:
    properties:
      connection_status:
        $ref: '#/definitions/domain.UserConnectionStatusEnum'
      created_at:
        type: string
      from_account_id:
        type: integer
      from_default_split_percentage:
        type: integer
      from_linked_transaction_day_of_month:
        description: |-
          Optional day-of-month (1–31) on which each side wants their linked transaction
          to be created when the other participant splits a transaction with them. nil
          means "no preference" — the linked transaction inherits the source date.
        type: integer
      from_user_avatar_url:
        type: string
      from_user_id:
        type: integer
      from_user_name:
        type: string
      id:
        type: integer
      to_account_id:
        type: integer
      to_default_split_percentage:
        type: integer
      to_linked_transaction_day_of_month:
        type: integer
      to_user_avatar_url:
        type: string
      to_user_id:
        type: integer
      to_user_name:
        type: string
      updated_at:
        type: string
    type: object
  domain.UserConnectionStatusEnum:
    enum:
    - pending
    - accepted
    - rejected
    type: string
    x-enum-varnames:
    - UserConnectionStatusPending
    - UserConnectionStatusAccepted
    - UserConnectionStatusRejected
  domain.VapidPublicKeyResponse:
    properties:
      key:
        type: string
    type: object
  handler.AcceptInviteRequest:
    properties:
      external_id:
        type: string
      from_default_split_percentage:
        type: integer
    type: object
  handler.ReorderRequest:
    properties:
      account_ids:
        items:
          type: integer
        type: array
    type: object
  handler.UpdateConnectionSettingsRequest:
    properties:
      account_name:
        type: string
      default_split_percentage:
        type: integer
      linked_transaction_day_of_month:
        description: |-
          Optional day-of-month (1–31) on which the caller's linked transactions are
          created when the other participant splits a transaction with them. nil clears
          the preference (the linked transaction inherits the source transaction date).
        type: integer
    type: object
  handler.adminUserView:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      name:
        type: string
    type: object
  handler.meImpersonator:
    properties:
      admin_email:
        type: string
      admin_user_id:
        type: integer
    type: object
  handler.meResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      external_id:
        type: string
      id:
        type: integer
      impersonator:
        $ref: '#/definitions/handler.meImpersonator'
      is_admin:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
    type: object
  handler.startImpersonationResponse:
    properties:
      expires_at:
        type: string
      target_user:
        $ref: '#/definitions/domain.User'
    type: object
  handler.testLoginRequest:
    properties:
      email:
        type: string
    type: object
  middleware.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
host: localhost:8080
info:
  contact: {}
  description: Go backend for a couples' finance management app.
  title: Finance App API
  version: "1.0"
paths:
  /api/accounts:
    get:
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Account'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      parameters:
      - description: Account data
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/domain.Account'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Create account
      tags:
      - accounts
  /api/accounts/{id}:
    delete:
      description: Permanently deletes an account. When the account has transactions,
        pass `strategy=delete_transactions` or `strategy=migrate` (with `target_account_id`).
        Connection accounts cannot be deleted.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: 'Deletion strategy: delete_transactions | migrate'
        in: query
        name: strategy
        type: string
      - description: Target account when strategy=migrate
        in: query
        name: target_account_id
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Delete account
      tags:
      - accounts
    put:
      consumes:
      - application/json
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Account data
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/domain.Account'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Update account
      tags:
      - accounts
  /api/accounts/{id}/activate:
    post:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Activate account
      tags:
      - accounts
  /api/accounts/{id}/deactivate:
    post:
      description: Soft-disables an account without removing its data.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Deactivate account
      tags:
      - accounts
  /api/accounts/{id}/deletion-info:
    get:
      description: Returns the number of transactions linked to the account so the
        client can prompt before a destructive delete.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.AccountDeletionInfo'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Get account deletion impact
      tags:
      - accounts
  /api/accounts/reorder:
    put:
      consumes:
      - application/json
      description: Persists the display order of the user's accounts.
      parameters:
      - description: Ordered account IDs
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ReorderRequest'
      responses:
        "204":
