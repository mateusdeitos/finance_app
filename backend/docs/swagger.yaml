        in: query
        name: month
        required: true
        type: integer
      - description: Year
        in: query
        name: year
        required: true
        type: integer
      - collectionFormat: multi
        description: Filter by account IDs
        in: query
        items:
          type: integer
        name: account_id[]
        type: array
      - collectionFormat: multi
        description: Filter by category IDs
        in: query
        items:
          type: integer
        name: category_id[]
        type: array
      - collectionFormat: multi
        description: Filter by tag IDs
        in: query
        items:
          type: integer
        name: tag_id[]
        type: array
