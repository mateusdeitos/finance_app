basePath: /
definitions:
  domain.AcceptChargeRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: integer
      date:
        type: string
    type: object
  domain.Account:
    properties:
      avatar_background_color:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      initial_balance:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
      user_connection:
        $ref: '#/definitions/domain.UserConnection'
      user_id:
        type: integer
    type: object
  domain.BalanceResult:
    properties:
      balance:
        type: integer
    type: object
  domain.Category:
    properties:
      children:
        items:
          $ref: '#/definitions/domain.Category'
        type: array
      created_at:
        type: string
      emoji:
        type: string
      id:
        type: integer
      name:
        type: string
      parent:
        $ref: '#/definitions/domain.Category'
      parent_id:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.Charge:
    properties:
      amount:
        type: integer
      charger_account_id:
        type: integer
      charger_user_id:
        type: integer
      connection_id:
        type: integer
      created_at:
        type: string
      date:
        type: string
      description:
        type: string
      id:
        type: integer
      payer_account_id:
        type: integer
      payer_user_id:
        type: integer
      period_month:
        type: integer
      period_year:
        type: integer
      status:
        $ref: '#/definitions/domain.ChargeStatus'
      updated_at:
        type: string
    type: object
  domain.ChargeInitiatorRole:
    enum:
    - charger
    - payer
    type: string
    x-enum-varnames:
    - ChargeInitiatorRoleCharger
    - ChargeInitiatorRolePayer
  domain.ChargeStatus:
    enum:
    - pending
    - paid
    - rejected
    - cancelled
    type: string
    x-enum-varnames:
    - ChargeStatusPending
    - ChargeStatusPaid
    - ChargeStatusRejected
    - ChargeStatusCancelled
  domain.CheckDuplicateRequest:
    properties:
      account_id:
        description: optional; when set, only checks within that account
        type: integer
      amount:
        description: cents
        type: integer
      date:
        allOf:
        - $ref: '#/definitions/domain.Date'
        description: accepts YYYY-MM-DD, datetime, or RFC3339
    type: object
  domain.CreateChargeRequest:
    properties:
      amount:
        type: integer
      connection_id:
        type: integer
      date:
        type: string
      description:
        type: string
      my_account_id:
        type: integer
      period_month:
        type: integer
      period_year:
        type: integer
      role:
        $ref: '#/definitions/domain.ChargeInitiatorRole'
    type: object
  domain.Date:
    properties:
      time.Time:
        type: string
    type: object
  domain.DeleteCategoryRequest:
    properties:
      replace_with_id:
        type: integer
    type: object
  domain.ImportCSVResponse:
    properties:
      duplicate_count:
        type: integer
      error_count:
        type: integer
      rows:
        items:
          $ref: '#/definitions/domain.ParsedImportRow'
        type: array
      total_rows:
        type: integer
    type: object
  domain.ImportRowStatus:
    enum:
    - pending
    - duplicate
    type: string
    x-enum-varnames:
    - ImportRowStatusPending
    - ImportRowStatusDuplicate
  domain.OnboardingAccountInput:
    properties:
      avatar_background_color:
        type: string
      description:
        type: string
      initial_balance:
        type: integer
      name:
        type: string
    type: object
  domain.OnboardingCategoryInput:
    properties:
      children:
        items:
          $ref: '#/definitions/domain.OnboardingCategoryInput'
        type: array
      emoji:
        type: string
      name:
        type: string
    type: object
  domain.OnboardingSetupRequest:
    properties:
      accounts:
        items:
          $ref: '#/definitions/domain.OnboardingAccountInput'
        type: array
      categories:
        items:
          $ref: '#/definitions/domain.OnboardingCategoryInput'
        type: array
    type: object
  domain.OnboardingStatus:
    properties:
      completed:
        type: boolean
    type: object
  domain.OperationType:
    enum:
    - credit
    - debit
    type: string
    x-enum-varnames:
    - OperationTypeCredit
    - OperationTypeDebit
  domain.ParsedImportRow:
    properties:
      amount:
        description: cents
        type: integer
      category_id:
        type: integer
      category_inferred:
        type: boolean
      date:
        type: string
      description:
        type: string
      destination_account_id:
        type: integer
      parse_errors:
        items:
          type: string
        type: array
      recurrence_count:
        type: integer
      recurrence_current_installment:
        type: integer
      recurrence_type:
        $ref: '#/definitions/domain.RecurrenceType'
      row_index:
        type: integer
      status:
        $ref: '#/definitions/domain.ImportRowStatus'
      type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.RecurrenceSettings:
    properties:
      current_installment:
        type: integer
      total_installments:
        type: integer
      type:
        $ref: '#/definitions/domain.RecurrenceType'
    type: object
  domain.RecurrenceType:
    enum:
    - daily
    - weekly
    - monthly
    - yearly
    type: string
    x-enum-varnames:
    - RecurrenceTypeDaily
    - RecurrenceTypeWeekly
    - RecurrenceTypeMonthly
    - RecurrenceTypeYearly
  domain.Settlement:
    properties:
      account_id:
        type: integer
      amount:
        description: Amount in cents
        type: integer
      created_at:
        type: string
      date:
        type: string
      id:
        type: integer
      parent_transaction_id:
        type: integer
      source_transaction_id:
        type: integer
      type:
        $ref: '#/definitions/domain.SettlementType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.SettlementType:
    enum:
    - credit
    - debit
    type: string
    x-enum-varnames:
    - SettlementTypeCredit
    - SettlementTypeDebit
  domain.SettlementUpdateRequest:
    properties:
      date:
        $ref: '#/definitions/domain.Date'
    type: object
  domain.SplitSettings:
    properties:
      amount:
        type: integer
      connection_id:
        type: integer
      percentage:
        type: integer
      userConnection:
        $ref: '#/definitions/domain.UserConnection'
    type: object
  domain.Tag:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.Transaction:
    properties:
      account_id:
        type: integer
      amount:
        description: Amount in cents
        type: integer
      category_id:
        type: integer
      charge_id:
        type: integer
      created_at:
        type: string
      date:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      id:
        type: integer
      installment_number:
        type: integer
      linked_transactions:
        items:
          $ref: '#/definitions/domain.Transaction'
        type: array
      operation_type:
        $ref: '#/definitions/domain.OperationType'
      origin_settlement_id:
        description: |-
          OriginSettlementID is set only on synthetic Transaction entries produced
          by the listing endpoint to surface settlements whose source transaction
          lives on a different (non-filtered) account. The ID field of such entries
          is a negative sentinel; the row is read-only and should not be edited.
        type: integer
      original_user_id:
        type: integer
      settlements_from_source:
        items:
          $ref: '#/definitions/domain.Settlement'
        type: array
      source_transaction_id:
        description: |-
          SourceTransactionID is set only on synthetic Transaction entries (see
          OriginSettlementID). It points to the real source transaction backing
          the surfaced settlement so the frontend can fetch the full transaction
          and open it for editing when the synthetic row is clicked.
        type: integer
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_recurrence:
        $ref: '#/definitions/domain.TransactionRecurrence'
      transaction_recurrence_id:
        type: integer
      type:
        $ref: '#/definitions/domain.TransactionType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.TransactionCreateRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: integer
      category_id:
        type: integer
      charge_id:
        type: integer
      date:
        $ref: '#/definitions/domain.Date'
      description:
        type: string
      destination_account_id:
        type: integer
      recurrence_settings:
        $ref: '#/definitions/domain.RecurrenceSettings'
      split_settings:
        items:
          $ref: '#/definitions/domain.SplitSettings'
        type: array
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.TransactionPropagationSettings:
    enum:
    - all
    - current
    - current_and_future
    type: string
    x-enum-varnames:
    - TransactionPropagationSettingsAll
    - TransactionPropagationSettingsCurrent
    - TransactionPropagationSettingsCurrentAndFuture
  domain.TransactionRecurrence:
    properties:
      created_at:
        type: string
      id:
        type: integer
      installments:
        type: integer
      type:
        $ref: '#/definitions/domain.RecurrenceType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.TransactionType:
    enum:
    - expense
    - income
    - transfer
    type: string
    x-enum-varnames:
    - TransactionTypeExpense
    - TransactionTypeIncome
    - TransactionTypeTransfer
  domain.TransactionUpdateRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: integer
      category_id:
        type: integer
      date:
        $ref: '#/definitions/domain.Date'
      description:
        type: string
      destination_account_id:
        type: integer
      propagation_settings:
        $ref: '#/definitions/domain.TransactionPropagationSettings'
      recurrence_settings:
        $ref: '#/definitions/domain.RecurrenceSettings'
      split_settings:
        items:
          $ref: '#/definitions/domain.SplitSettings'
        type: array
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      external_id:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.UserConnection:
    properties:
      connection_status:
        $ref: '#/definitions/domain.UserConnectionStatusEnum'
      created_at:
        type: string
      from_account_id:
        type: integer
      from_default_split_percentage:
        type: integer
      from_user_avatar_url:
        type: string
      from_user_id:
        type: integer
      from_user_name:
        type: string
      id:
        type: integer
      to_account_id:
        type: integer
      to_default_split_percentage:
        type: integer
      to_user_avatar_url:
        type: string
      to_user_id:
        type: integer
      to_user_name:
        type: string
      updated_at:
        type: string
    type: object
  domain.UserConnectionStatusEnum:
    enum:
    - pending
    - accepted
    - rejected
    type: string
    x-enum-varnames:
    - UserConnectionStatusPending
    - UserConnectionStatusAccepted
    - UserConnectionStatusRejected
  handler.AcceptInviteRequest:
    properties:
      external_id:
        type: string
      from_default_split_percentage:
        type: integer
    type: object
  handler.testLoginRequest:
    properties:
      email:
        type: string
    type: object
  middleware.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
host: localhost:8080
info:
  contact: {}
  description: Go backend for a couples' finance management app.
  title: Finance App API
  version: "1.0"
paths:
  /api/accounts:
    get:
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Account'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      parameters:
      - description: Account data
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/domain.Account'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Create account
      tags:
      - accounts
  /api/accounts/{id}:
    delete:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Delete account
      tags:
      - accounts
    put:
      consumes:
      - application/json
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Account data
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/domain.Account'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Update account
      tags:
      - accounts
  /api/accounts/{id}/activate:
    post:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Activate account
      tags:
      - accounts
  /api/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /api/categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Category'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Category data
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/domain.Category'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Category'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Create category
      tags:
      - categories
  /api/categories/{id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Optional replacement category
        in: body
        name: request
        schema:
          $ref: '#/definitions/domain.DeleteCategoryRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Delete category
      tags:
      - categories
    put:
      consumes:
      - application/json
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Category data
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/domain.Category'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Update category
      tags:
      - categories
  /api/charges:
    get:
      parameters:
      - description: Filter direction
        enum:
        - sent
        - received
        in: query
        name: direction
        type: string
      - description: Filter status
        enum:
        - pending
        - paid
        - rejected
        - cancelled
        in: query
        name: status
        type: string
      - description: Filter by connection ID
        in: query
        name: connection_id
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/domain.Charge'
              type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List charges
      tags:
      - charges
    post:
      consumes:
      - application/json
      parameters:
      - description: Charge data
        in: body
        name: charge
        required: true
        schema:
          $ref: '#/definitions/domain.CreateChargeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Charge'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Create a charge
      tags:
      - charges
  /api/charges/{id}/accept:
    post:
      consumes:
      - application/json
      description: Atomically settles a pending charge by creating two linked transfer
        transactions. Caller must be the non-initiating party (the one whose account
        field is nil on the charge).
      parameters:
      - description: Charge ID
        in: path
        name: id
        required: true
        type: integer
      - description: Accept request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.AcceptChargeRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "409":
          description: Charge already accepted or not pending
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Accept a charge (non-initiating party only)
      tags:
      - charges
  /api/charges/{id}/cancel:
    post:
      parameters:
      - description: Charge ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Cancel a charge (charger only)
      tags:
      - charges
  /api/charges/{id}/reject:
    post:
      parameters:
      - description: Charge ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Reject a charge (payer only)
      tags:
      - charges
  /api/charges/pending-count:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              format: int64
              type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Count pending charges requiring caller's action
      tags:
      - charges
  /api/onboarding/complete:
    post:
      consumes:
      - application/json
      parameters:
      - description: Initial accounts and categories
        in: body
        name: request
