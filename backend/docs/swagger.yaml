  /api/transactions/by-ids:
    get:
      description: 'Returns the caller''s transactions for the given IDs across any
        period (no month/year required). IDs the caller does not own are silently
        absent — the frontend marks them as missing. Empty id[] returns 200 with an
        empty array. Cap: ≤20 IDs recommended.'
      parameters:
      - collectionFormat: multi
        description: Transaction IDs
        in: query
        items:
          type: integer
        name: id[]
        type: array
