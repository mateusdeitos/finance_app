basePath: /
definitions:
  domain.Account:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      initial_balance:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_connection:
        $ref: '#/definitions/domain.UserConnection'
      user_id:
        type: integer
    type: object
  domain.BalanceResult:
    properties:
      balance:
        type: integer
    type: object
  domain.Category:
    properties:
      children:
        items:
          $ref: '#/definitions/domain.Category'
        type: array
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      parent:
        $ref: '#/definitions/domain.Category'
      parent_id:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.OperationType:
    enum:
    - credit
    - debit
    type: string
    x-enum-varnames:
    - OperationTypeCredit
    - OperationTypeDebit
  domain.RecurrenceSettings:
    properties:
      end_date:
        type: string
      repetitions:
        description: nil = indefinite
        type: integer
      type:
        $ref: '#/definitions/domain.RecurrenceType'
    type: object
  domain.RecurrenceType:
    enum:
    - daily
    - weekly
    - monthly
    - yearly
    type: string
    x-enum-varnames:
    - RecurrenceTypeDaily
    - RecurrenceTypeWeekly
    - RecurrenceTypeMonthly
    - RecurrenceTypeYearly
  domain.Settlement:
    properties:
      account_id:
        type: integer
      amount:
        description: Amount in cents
        type: integer
      created_at:
        type: string
      id:
        type: integer
      parent_transaction_id:
        type: integer
      source_transaction_id:
        type: integer
      type:
        $ref: '#/definitions/domain.SettlementType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.SettlementType:
    enum:
    - credit
    - debit
    type: string
    x-enum-varnames:
    - SettlementTypeCredit
    - SettlementTypeDebit
  domain.SplitSettings:
    properties:
      amount:
        type: integer
      connection_id:
        type: integer
      percentage:
        type: integer
      userConnection:
        $ref: '#/definitions/domain.UserConnection'
    type: object
  domain.Tag:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.Transaction:
    properties:
      account_id:
        type: integer
      amount:
        description: Amount in cents
        type: integer
      category_id:
        type: integer
      created_at:
        type: string
      date:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      id:
        type: integer
      installment_number:
        type: integer
      linked_transactions:
        items:
          $ref: '#/definitions/domain.Transaction'
        type: array
      operation_type:
        $ref: '#/definitions/domain.OperationType'
      original_user_id:
        type: integer
      settlements_from_source:
        items:
          $ref: '#/definitions/domain.Settlement'
        type: array
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_recurrence:
        $ref: '#/definitions/domain.TransactionRecurrence'
      transaction_recurrence_id:
        type: integer
      type:
        $ref: '#/definitions/domain.TransactionType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.TransactionCreateRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: integer
      category_id:
        type: integer
      date:
        type: string
      description:
        type: string
      destination_account_id:
        type: integer
      recurrence_settings:
        $ref: '#/definitions/domain.RecurrenceSettings'
      split_settings:
        items:
          $ref: '#/definitions/domain.SplitSettings'
        type: array
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.TransactionPropagationSettings:
    enum:
    - all
    - current
    - current_and_future
    type: string
    x-enum-varnames:
    - TransactionPropagationSettingsAll
    - TransactionPropagationSettingsCurrent
    - TransactionPropagationSettingsCurrentAndFuture
  domain.TransactionRecurrence:
    properties:
      created_at:
        type: string
      id:
        type: integer
      installments:
        type: integer
      type:
        $ref: '#/definitions/domain.RecurrenceType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.TransactionType:
    enum:
    - expense
    - income
    - transfer
    type: string
    x-enum-varnames:
    - TransactionTypeExpense
    - TransactionTypeIncome
    - TransactionTypeTransfer
  domain.TransactionUpdateRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: integer
      category_id:
        type: integer
      date:
        type: string
      description:
        type: string
      destination_account_id:
        type: integer
      propagation_settings:
        $ref: '#/definitions/domain.TransactionPropagationSettings'
      recurrence_settings:
        $ref: '#/definitions/domain.RecurrenceSettings'
      split_settings:
        items:
          $ref: '#/definitions/domain.SplitSettings'
        type: array
      tags:
        items:
          $ref: '#/definitions/domain.Tag'
        type: array
      transaction_type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.UserConnection:
    properties:
      connection_status:
        $ref: '#/definitions/domain.UserConnectionStatusEnum'
      created_at:
        type: string
      from_account_id:
        type: integer
      from_default_split_percentage:
        type: integer
      from_user_id:
        type: integer
      id:
        type: integer
      to_account_id:
        type: integer
      to_default_split_percentage:
        type: integer
      to_user_id:
        type: integer
      updated_at:
        type: string
    type: object
  domain.UserConnectionStatusEnum:
    enum:
    - pending
    - accepted
    - rejected
    type: string
    x-enum-varnames:
    - UserConnectionStatusPending
    - UserConnectionStatusAccepted
    - UserConnectionStatusRejected
  middleware.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Go backend for a couples' finance management app.
  title: Finance App API
  version: "1.0"
paths:
  /api/accounts:
    get:
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Account'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      parameters:
      - description: Account data
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/domain.Account'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Create account
      tags:
      - accounts
  /api/accounts/{id}:
    delete:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      responses:
