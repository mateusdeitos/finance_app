securityDefinitions:
  BearerAuth:
    description: JWT token — prefix with "Bearer "
    in: header
    name: Authorization
    type: apiKey
  CookieAuth:
    description: JWT token in HttpOnly cookie set after OAuth login
    in: cookie
    name: auth_token
    type: apiKey
swagger: "2.0"
