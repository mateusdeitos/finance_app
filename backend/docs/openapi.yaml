          example: 4990
        operation_type:
          $ref: "#/components/schemas/OperationType"
        date:
          type: string
          format: date-time
        description:
          type: string
          example: Lunch
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
