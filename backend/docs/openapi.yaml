openapi: 3.0.3
info:
  title: Finance App API
  description: |
    Go backend for a couples' finance management app.

    ## Authentication

    Most endpoints require a valid JWT token. It can be provided as:
    - An `Authorization: Bearer <token>` header
    - An `auth_token` HttpOnly cookie (set automatically after OAuth login)

    ## OAuth Login Flow

    1. Redirect the user to `GET /auth/{provider}` (e.g. `/auth/google`)
    2. The provider redirects to `GET /auth/{provider}/callback`
    3. The server sets an `auth_token` cookie and redirects to the frontend

    ## Amounts

    All monetary amounts are stored and returned in **cents** (int64).
    For example, $10.50 → `1050`.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - cookieAuth: []
  - bearerAuth: []

tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication (OAuth2 + JWT)
  - name: accounts
    description: Bank accounts
  - name: categories
    description: Transaction categories
  - name: tags
    description: Transaction tags
  - name: transactions
    description: Financial transactions
  - name: user-connections
    description: Partner connections for shared finance

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/{provider}:
    get:
      tags: [auth]
      summary: Start OAuth flow
      description: Redirects the user to the OAuth provider's authorization page.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google]
          description: OAuth provider name
      responses:
        "302":
          description: Redirect to OAuth provider

  /auth/{provider}/callback:
    get:
      tags: [auth]
      summary: OAuth callback
      description: |
        Handles the OAuth provider callback. Sets the `auth_token` HttpOnly cookie
        and redirects to the frontend `/auth/callback` path.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google]
        - name: code
          in: query
          schema:
            type: string
          description: Authorization code from the provider
        - name: state
          in: query
          schema:
            type: string
      responses:
        "307":
          description: Redirect to frontend with auth cookie set
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/me:
    get:
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Logout
      description: Clears the `auth_token` cookie and invalidates the current session.
      responses:
        "204":
          description: Successfully logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/accounts:
    get:
      tags: [accounts]
      summary: List accounts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: user_ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [accounts]
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountCreate"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/accounts/{id}:
    put:
      tags: [accounts]
      summary: Update account
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountCreate"
      responses:
        "204":
          description: Account updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [accounts]
      summary: Delete account
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Account deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/categories:
    get:
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories (with nested children)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreate"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/categories/{id}:
    put:
      tags: [categories]
      summary: Update category
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreate"
      responses:
        "204":
          description: Category updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [categories]
      summary: Delete category
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Category deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tags:
    get:
      tags: [tags]
      summary: List tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [tags]
      summary: Create tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagCreate"
      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/tags/{id}:
    put:
      tags: [tags]
      summary: Update tag
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagCreate"
      responses:
        "204":
          description: Tag updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [tags]
      summary: Delete tag
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Tag deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/user-connections:
    get:
      tags: [user-connections]
      summary: List user connections
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: from_user_ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: to_user_ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: connection_status
          in: query
          schema:
            $ref: "#/components/schemas/ConnectionStatus"
      responses:
        "200":
          description: List of user connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserConnection"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [user-connections]
      summary: Create user connection (invite partner)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserConnectionCreate"
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserConnection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/user-connections/{id}:
    delete:
      tags: [user-connections]
      summary: Delete user connection
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Connection deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/user-connections/{id}/{status}:
    patch:
      tags: [user-connections]
      summary: Update connection status (accept / reject)
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: status
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectionStatus"
      responses:
        "204":
          description: Status updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/transactions:
    get:
      tags: [transactions]
      summary: List transactions for a period
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 3
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2026
        - name: id[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: account_id[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: category_id[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: tag_id[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: type[]
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/TransactionType"
          style: form
          explode: true
        - name: description[query]
          in: query
          schema:
            type: string
          description: Text search on description
        - name: description[exact]
          in: query
          schema:
            type: boolean
          description: Whether to match description exactly
        - name: with_settlements
          in: query
          schema:
            type: boolean
          description: Include settlement details in response
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [transactions]
      summary: Create transaction
      description: |
        Creates a new transaction. For **transfers**, set `transaction_type: transfer`
        and provide `destination_account_id`. For **recurring** transactions, include
        `recurrence_settings`. For **split** (shared) transactions, include `split_settings`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCreateRequest"
            examples:
              expense:
                summary: Simple expense
                value:
                  transaction_type: expense
                  account_id: 1
                  category_id: 5
                  amount: 4990
                  date: "2026-03-17T10:00:00Z"
                  description: Lunch
              recurring_income:
                summary: Monthly recurring income
                value:
                  transaction_type: income
                  account_id: 1
                  amount: 500000
                  date: "2026-03-01T00:00:00Z"
                  description: Salary
                  recurrence_settings:
                    type: monthly
                    repetitions: 12
              transfer:
                summary: Transfer between accounts
                value:
                  transaction_type: transfer
                  account_id: 1
                  destination_account_id: 2
                  amount: 100000
                  date: "2026-03-17T10:00:00Z"
                  description: Move savings
      responses:
        "201":
          description: Transaction created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/transactions/balance:
    get:
      tags: [transactions]
      summary: Get balance for a period
      description: |
        Returns the net balance (income − expenses) for the given month/year.
        Set `accumulated: true` to include all periods up to and including the given month.
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 3
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2026
        - name: account_id[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: category_id[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: tag_id[]
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: accumulated
          in: query
          schema:
            type: boolean
          description: Include all previous periods in the calculation
      responses:
        "200":
          description: Balance for the period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/transactions/{id}:
    get:
      tags: [transactions]
      summary: Get transaction by ID
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [transactions]
      summary: Update transaction
      description: |
        All fields are optional. Use `propagation_settings` to control how updates
        propagate to recurring installments.
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdateRequest"
      responses:
        "204":
          description: Transaction updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [transactions]
      summary: Delete transaction
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: propagation_settings
          in: query
          schema:
            $ref: "#/components/schemas/PropagationSettings"
          description: |
            Controls which recurring installments are deleted alongside this one.
            Defaults to `current` (only this installment).
      responses:
        "204":
          description: Transaction deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: JWT token in HttpOnly cookie, set automatically after OAuth login
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token in the `Authorization` header

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Bad request — invalid parameters or body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Bad Request
            message: invalid request body
    Unauthorized:
      description: Unauthorized — missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Unauthorized
            message: missing or invalid token
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Not Found
            message: record not found
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: invalid request body

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    Account:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
          example: Checking
        description:
          type: string
          nullable: true
        initial_balance:
          type: integer
          format: int64
          description: Initial balance in cents
          example: 100000
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        user_connection:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/UserConnection"

    AccountCreate:
      type: object
      required: [name, initial_balance]
      properties:
        name:
          type: string
          example: Savings
        description:
          type: string
          example: Main savings account
        initial_balance:
          type: integer
          format: int64
          description: Initial balance in cents
          example: 0

    Category:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
          example: Food
        parent_id:
          type: integer
          nullable: true
        parent:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Category"
        children:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    CategoryCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Restaurants
        parent_id:
          type: integer
          description: Parent category ID for nested categories

    Tag:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
          example: vacation
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    TagCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: vacation

    ConnectionStatus:
      type: string
      enum: [pending, accepted, rejected]
      example: accepted

    UserConnection:
      type: object
      properties:
        id:
          type: integer
        from_user_id:
          type: integer
        from_account_id:
          type: integer
        from_default_split_percentage:
          type: integer
          example: 50
        to_user_id:
          type: integer
        to_account_id:
          type: integer
        to_default_split_percentage:
          type: integer
          example: 50
        connection_status:
          $ref: "#/components/schemas/ConnectionStatus"
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    UserConnectionCreate:
      type: object
      required: [to_user_id, from_default_split_percentage]
      properties:
        to_user_id:
          type: integer
          description: ID of the partner to invite
        from_default_split_percentage:
          type: integer
          minimum: 0
          maximum: 100
          description: Default percentage this user pays on shared expenses
          example: 50

    TransactionType:
      type: string
      enum: [expense, income, transfer]
      example: expense

    OperationType:
      type: string
      enum: [credit, debit]
      example: debit

    RecurrenceType:
      type: string
      enum: [daily, weekly, monthly, yearly]
      example: monthly

    PropagationSettings:
      type: string
      enum: [all, current, current_and_future]
      description: |
        Controls how an update or delete propagates to recurring installments:
        - `current` — only this installment (default)
        - `current_and_future` — this and all future installments
        - `all` — all installments in the recurrence
      example: current

    TransactionRecurrence:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        type:
          $ref: "#/components/schemas/RecurrenceType"
        installments:
          type: integer
          description: Total number of installments (0 = indefinite)
          example: 12
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    RecurrenceSettings:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/RecurrenceType"
        repetitions:
          type: integer
          nullable: true
          description: Number of repetitions. Omit or set to null for indefinite recurrence.
          example: 12
        end_date:
          type: string
          format: date-time
          nullable: true
          description: Alternative to `repetitions` — recur until this date.

    SplitSettings:
      type: object
      required: [connection_id]
      properties:
        connection_id:
          type: integer
          description: ID of the UserConnection to split with
        percentage:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: Percentage of the total to assign to this connection
        amount:
          type: integer
          format: int64
          nullable: true
          description: Fixed amount in cents (alternative to percentage)

    Settlement:
      type: object
      description: Auto-generated entry tracking one side of a shared expense split
      properties:
        id:
          type: integer
        user_id:
          type: integer
        amount:
          type: integer
          format: int64
          description: Amount in cents
        type:
          type: string
          enum: [credit, debit]
        account_id:
          type: integer
        source_transaction_id:
          type: integer
        parent_transaction_id:
