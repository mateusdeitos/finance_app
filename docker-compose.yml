services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile.claude
    stdin_open: true
    tty: true
    command: claude --dangerously-skip-permissions
    working_dir: /workspace
    volumes:
      - .:/workspace
      # Persist Claude config and memory across sessions
      - ~/.claude:/home/node/.claude
      - ~/.claude.json:/home/node/.claude.json
      # Mount Docker socket to allow running docker/just commands inside the container
      - /var/run/docker.sock:/var/run/docker.sock
