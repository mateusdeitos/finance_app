name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🧹 Chores'
    labels:
      - 'chore'
      - 'refactor'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
      - 'deps'

version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'fix'
      - 'chore'
      - 'refactor'
      - 'dependencies'
      - 'deps'
  default: patch

template: |
  ## Changes

  $CHANGES
