name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Force backend deploy (skip change detection)"
        type: boolean
        default: false
      force_frontend:
        description: "Force frontend deploy (skip change detection)"
        type: boolean
        default: false
      skip_migration_check:
        description: "Skip pending migrations check (emergency use only)"
        type: boolean
        default: false

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check force deploy overrides
        id: force
        run: |
          echo "backend=${{ inputs.force_backend || false }}" >> $GITHUB_OUTPUT
          echo "frontend=${{ inputs.force_frontend || false }}" >> $GITHUB_OUTPUT

      - name: Get previous tag
        if: github.event_name == 'release'
        id: prev-tag
        run: |
          CURRENT_TAG=${{ github.event.release.tag_name }}
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT

      - name: Check changed paths
        id: filter
        run: |
          # Force deploy overrides
          if [ "${{ steps.force.outputs.backend }}" = "true" ]; then
            echo "Force backend deploy requested"
            FORCE_BACKEND=true
          fi
          if [ "${{ steps.force.outputs.frontend }}" = "true" ]; then
            echo "Force frontend deploy requested"
            FORCE_FRONTEND=true
          fi

          # On workflow_dispatch without force flags, deploy nothing (require explicit choice)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=${FORCE_BACKEND:-false}" >> $GITHUB_OUTPUT
            echo "frontend=${FORCE_FRONTEND:-false}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Release-based change detection
          PREV_TAG=${{ steps.prev-tag.outputs.prev_tag }}
          CURRENT_TAG=${{ steps.prev-tag.outputs.current_tag }}

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, deploying everything"
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only "${PREV_TAG}..${CURRENT_TAG}")
            echo "Changed files:"
            echo "$CHANGED"

            if [ "${FORCE_BACKEND}" = "true" ] || echo "$CHANGED" | grep -qE '^(backend|infra|\.github)/'; then
              echo "backend=true" >> $GITHUB_OUTPUT
            else
              echo "backend=false" >> $GITHUB_OUTPUT
            fi

            if [ "${FORCE_FRONTEND}" = "true" ] || echo "$CHANGED" | grep -qE '^(frontend|infra|\.github)/'; then
              echo "frontend=true" >> $GITHUB_OUTPUT
            else
              echo "frontend=false" >> $GITHUB_OUTPUT
            fi
          fi

  check-migrations:
    name: Check pending migrations
    runs-on: ubuntu-latest
    environment: prod
    needs: detect-changes
    if: >-
      !inputs.skip_migration_check &&
      (needs.detect-changes.outputs.backend == 'true' ||
       needs.detect-changes.outputs.frontend == 'true')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.26.0

      - name: Check pending migrations
        working-directory: backend
        env:
          DB_DSN: ${{ secrets.DB_DSN_PROD }}
        run: |
          STATUS=$(goose -dir migrations postgres "$DB_DSN" status)
          echo "$STATUS"
          PENDING=$(echo "$STATUS" | grep -c "Pending" || true)
          if [ "$PENDING" -gt 0 ]; then
            echo "::error::Found $PENDING pending migration(s). Run the 'Run DB Migrations' workflow before deploying, or rerun this workflow with skip_migration_check=true."
            exit 1
          fi
          echo "No pending migrations. Deploy can proceed."

  backend-deploy:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    environment: prod
    needs: [detect-changes, check-migrations]
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=manual-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker for GAR
        run: |
          gcloud auth configure-docker ${{ vars.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE=${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/backend
          docker build \
            -f backend/docker/Dockerfile \
            -t $IMAGE:${{ steps.tag.outputs.value }} \
            -t $IMAGE:latest \
            ./backend

      - name: Push Docker image
        run: |
          IMAGE=${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/backend
          docker push $IMAGE:${{ steps.tag.outputs.value }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/backend:${{ steps.tag.outputs.value }}

  frontend-deploy:
    name: Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    environment: prod
    needs: [detect-changes, check-migrations]
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: frontend
