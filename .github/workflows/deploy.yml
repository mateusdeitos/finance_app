name: Deploy

on:
  release:
    types: [published]

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev-tag
        run: |
          CURRENT_TAG=${{ github.event.release.tag_name }}
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT

      - name: Check changed paths
        id: filter
        run: |
          PREV_TAG=${{ steps.prev-tag.outputs.prev_tag }}
          CURRENT_TAG=${{ steps.prev-tag.outputs.current_tag }}

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, deploying everything"
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only "${PREV_TAG}..${CURRENT_TAG}")
            echo "Changed files:"
            echo "$CHANGED"

            if echo "$CHANGED" | grep -qE '^(backend|infra|\.github)/'; then
              echo "backend=true" >> $GITHUB_OUTPUT
            else
              echo "backend=false" >> $GITHUB_OUTPUT
            fi

            if echo "$CHANGED" | grep -qE '^(frontend|infra|\.github)/'; then
              echo "frontend=true" >> $GITHUB_OUTPUT
            else
              echo "frontend=false" >> $GITHUB_OUTPUT
            fi
          fi

  backend-deploy:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    environment: prod
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker for GAR
        run: |
          gcloud auth configure-docker ${{ vars.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE=${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/backend
          docker build \
            -f backend/docker/Dockerfile \
            -t $IMAGE:${{ github.event.release.tag_name }} \
            -t $IMAGE:latest \
            ./backend

      - name: Push Docker image
        run: |
          IMAGE=${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/backend
          docker push $IMAGE:${{ github.event.release.tag_name }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/backend:${{ github.event.release.tag_name }}

  frontend-deploy:
    name: Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    environment: prod
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: frontend
